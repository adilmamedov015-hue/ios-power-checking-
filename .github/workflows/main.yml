name: Build-Shadow
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and Sign
        run: |
          mkdir -p Payload/ShadowApp.app
          
          cat <<EOF > main.swift
          import UIKit
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  let vc = UIViewController()
                  vc.view.backgroundColor = .black
                  
                  let label = UILabel(frame: CGRect(x: 0, y: 0, width: 300, height: 150))
                  label.center = vc.view.center
                  label.textAlignment = .center
                  label.numberOfLines = 0
                  label.textColor = .green
                  label.font = UIFont.monospacedSystemFont(ofSize: 20, weight: .bold)
                  
                  UIDevice.current.isBatteryMonitoringEnabled = true
                  let batt = Int(UIDevice.current.batteryLevel * 100)
                  
                  label.text = "SHADOW SYSTEM\nONLINE\n\nBATTERY: \(batt)%"
                  
                  vc.view.addSubview(label)
                  window?.rootViewController = vc
                  window?.makeKeyAndVisible()
                  return true
              }
          }
          UIApplicationMain(CommandLine.argc, CommandLine.unsafeArgv, nil, NSStringFromClass(AppDelegate.self))
          EOF

          xcrun -sdk iphoneos swiftc -target arm64-apple-ios13.0 -o Payload/ShadowApp.app/ShadowApp main.swift

          cat <<EOF > Payload/ShadowApp.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>ShadowApp</string>
              <key>CFBundleIdentifier</key>
              <string>com.shadow.monitor</string>
              <key>CFBundleName</key>
              <string>ShadowApp</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
          </dict>
          </plist>
          EOF

          codesign -s - --force --deep Payload/ShadowApp.app

          zip -r ShadowApp.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ShadowApp-Signed
          path: ShadowApp.ipa
