name: Build-Final-Test
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ultimate Build
        run: |
          # 1. Создаем папку
          mkdir -p Payload/ShadowApp.app
          
          # 2. Самый простой Swift-код (без лишних наворотов)
          cat <<EOF > main.swift
          import UIKit
          class ViewController: UIViewController {
              override func viewDidLoad() {
                  super.view.viewDidLoad()
                  view.backgroundColor = .black
                  let label = UILabel(frame: CGRect(x: 0, y: 0, width: 300, height: 100))
                  label.center = view.center
                  label.textAlignment = .center
                  label.textColor = .green
                  label.text = "SHADOW SYSTEM\nONLINE"
                  label.numberOfLines = 0
                  view.addSubview(label)
              }
          }
          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  window?.rootViewController = ViewController()
                  window?.makeKeyAndVisible()
                  return true
              }
          }
          EOF

          # 3. Компиляция (с указанием пути к SDK)
          SDK_PATH=\$(xcrun --show-sdk-path --sdk iphoneos)
          xcrun -sdk iphoneos swiftc -target arm64-apple-ios13.0 -sdk \$SDK_PATH -o Payload/ShadowApp.app/ShadowApp main.swift

          # 4. Минимальный Info.plist
          cat <<EOF > Payload/ShadowApp.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>ShadowApp</string>
              <key>CFBundleIdentifier</key>
              <string>com.shadow.test</string>
              <key>CFBundleName</key>
              <string>ShadowApp</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>13.0</string>
          </dict>
          </plist>
          EOF

          # 5. Псевдо-подпись (чтобы не было cdhash error)
          codesign -s - --force Payload/ShadowApp.app/ShadowApp
          codesign -s - --force Payload/ShadowApp.app

          # 6. Упаковка
          zip -r ShadowApp.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ShadowApp-IPA
          path: ShadowApp.ipa
