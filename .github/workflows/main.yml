name: Build-IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Force Build Unsigned
        run: |
          xcodebuild build -sdk iphoneos -configuration Release CODE_SIGNING_ALLOWED=NO
          mkdir -p Payload
          mv build/Release-iphoneos/*.app Payload/
          zip -r ShadowApp.ipa Payload
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: my-ipa
          path: ShadowApp.ipa
