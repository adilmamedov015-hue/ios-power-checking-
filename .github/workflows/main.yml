name: Build-IPA
on:
  push:
  workflow_dispatch: # Та самая кнопка

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Project and Build
        run: |
          # 1. Создаем структуру папок
          mkdir -p ShadowApp/Payload
          
          # 2. Генерим минимальный проект через Swift Package Manager (так проще всего без Xcode)
          swift package init --type executable --name ShadowApp
          
          # 3. Компилим под iOS (используем упрощенный метод для создания .app)
          # В реале тут должен быть xcodebuild, но для теста соберем бинарник
          swift build -c release --triple arm64-apple-ios
          
          # 4. Собираем структуру IPA
          mkdir -p Payload/ShadowApp.app
          cp .build/arm64-apple-ios/release/ShadowApp Payload/ShadowApp.app/ShadowApp
          
          # Создаем базовый Info.plist, чтобы iOS поняла, что это за прога
          cat <<EOF > Payload/ShadowApp.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>ShadowApp</string>
              <key>CFBundleIdentifier</key>
              <string>com.shadow.monitor</string>
              <key>CFBundleName</key>
              <string>ShadowApp</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
          </dict>
          </plist>
          EOF
          
          # 5. Пакуем в IPA
          zip -r ShadowApp.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShadowApp-IPA
          path: ShadowApp.ipa
